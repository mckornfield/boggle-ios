name: Tracery
options:
  bundleIdPrefix: com.tracery
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Tracery:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tracery
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Tracery/Resources
        optional: true
    info:
      path: Tracery/Info.plist
      properties:
        CFBundleDisplayName: Tracery
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: "Tracery uses your local network to find and connect with other players on the same Wi-Fi network."
        NSBonjourServices:
          - _tracery-game._tcp
          - _tracery-game._udp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tracery.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO

  TraceryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - TraceryTests
    dependencies:
      - target: Tracery
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tracery.tests
        GENERATE_INFOPLIST_FILE: YES
